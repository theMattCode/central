name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

env:
  I12E_PROJECTS: i12e-postgres,i12e-orchestrator,i12e-gateway
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  validate-cockpit:
    if: ${{ !(github.event_name == 'pull_request' && github.event.action == 'closed') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Validate cockpit
        run: pnpm nx run-many --projects=cockpit -t lint typecheck test

  validate-backend:
    if: ${{ !(github.event_name == 'pull_request' && github.event.action == 'closed') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - run: pnpm install --frozen-lockfile

      - name: Validate backend
        run: pnpm nx run-many --projects=backend -t lint typecheck test

  validate-i12e:
    if: ${{ !(github.event_name == 'pull_request' && github.event.action == 'closed') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Validate i12e projects
        run: pnpm nx run-many --projects="$I12E_PROJECTS" -t lint typecheck test

      - name: Validate registry production compose
        run: docker compose --env-file i12e/orchestrator/deploy/.env.prod.example --file i12e/orchestrator/deploy/docker-compose.prod.yml config --quiet

  validate-release-ref:
    if: ${{ !(github.event_name == 'pull_request' && github.event.action == 'closed') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Reject release tag outside main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build-image-cockpit:
    if: ${{ !(github.event_name == 'pull_request' && github.event.action == 'closed') }}
    runs-on: ubuntu-latest
    needs:
      - validate-release-ref
      - validate-cockpit
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build cockpit image
        shell: bash
        run: |
          set -euo pipefail

          image_base="${REGISTRY}/${IMAGE_NAMESPACE,,}"
          image_tag="sha-${GITHUB_SHA::12}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            image_tag="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::12}"
          fi
          image="${image_base}/app-cockpit:${image_tag}"

          docker build --file apps/cockpit/Dockerfile --tag "$image" .

          docker push "$image"

  build-image-backend:
    if: ${{ !(github.event_name == 'pull_request' && github.event.action == 'closed') }}
    runs-on: ubuntu-latest
    needs:
      - validate-release-ref
      - validate-backend
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        shell: bash
        run: |
          set -euo pipefail

          image_base="${REGISTRY}/${IMAGE_NAMESPACE,,}"
          image_tag="sha-${GITHUB_SHA::12}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            image_tag="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::12}"
          fi
          image="${image_base}/service-backend:${image_tag}"

          docker build --file services/backend/Dockerfile --tag "$image" .

          docker push "$image"

  build-images-i12e:
    if: ${{ !(github.event_name == 'pull_request' && github.event.action == 'closed') }}
    runs-on: ubuntu-latest
    needs:
      - validate-release-ref
      - validate-i12e
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build i12e images
        shell: bash
        run: |
          set -euo pipefail

          image_base="${REGISTRY}/${IMAGE_NAMESPACE,,}"
          image_tag="sha-${GITHUB_SHA::12}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            image_tag="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::12}"
          fi
          postgres_image="${image_base}/i12e-postgres:${image_tag}"
          gateway_image="${image_base}/i12e-gateway:${image_tag}"

          docker build --file i12e/postgres/Dockerfile --tag "$postgres_image" i12e/postgres
          docker build --file i12e/gateway/Dockerfile --tag "$gateway_image" .

          docker push "$postgres_image"
          docker push "$gateway_image"

  test-images-integration:
    if: ${{ !(github.event_name == 'pull_request' && github.event.action == 'closed') }}
    runs-on: ubuntu-latest
    needs:
      - build-image-cockpit
      - build-image-backend
      - build-images-i12e
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test core image set
        shell: bash
        run: |
          set -euo pipefail

          image_tag="sha-${GITHUB_SHA::12}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            image_tag="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::12}"
          fi
          ci_env_file="$(mktemp)"

          compose_ci() {
            docker compose --env-file "$ci_env_file" --file i12e/orchestrator/deploy/docker-compose.prod.yml "$@"
          }

          cleanup() {
            compose_ci down --volumes --remove-orphans || true
            rm -f "$ci_env_file"
          }

          trap cleanup EXIT

          image_base="${REGISTRY}/${IMAGE_NAMESPACE,,}"
          docker pull "${image_base}/app-cockpit:${image_tag}"
          docker pull "${image_base}/service-backend:${image_tag}"
          docker pull "${image_base}/i12e-postgres:${image_tag}"
          docker pull "${image_base}/i12e-gateway:${image_tag}"

          {
            echo "CENTRAL_VERSION=$image_tag"
            echo "COMPOSE_PROJECT_NAME=central-ci-${GITHUB_RUN_ID}"
            echo "SERVICE_RESTART_POLICY=no"
            echo "GATEWAY_BIND=127.0.0.1"
            echo "GATEWAY_PORT=48080"
            echo "CENTRAL_ORIGIN=http://127.0.0.1:48080"
            echo "POSTGRES_USER=central"
            echo "POSTGRES_PASSWORD=central"
            echo "POSTGRES_DB=central"
            echo "BACKEND_DATABASE_URL=postgres://central:central@i12e-postgres:5432/central"
            echo "BACKEND_CORS_ALLOW_ORIGIN=http://127.0.0.1:48080"
            echo "BACKEND_BASE_URL=http://service-backend:8080"
          } > "$ci_env_file"

          compose_ci up --detach --wait i12e-postgres
          compose_ci run --rm i12e-postgres-migrate
          compose_ci up --detach --wait service-backend app-cockpit i12e-gateway
          curl --fail --silent --show-error http://127.0.0.1:48080/healthz >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:48080/ >/dev/null
          compose_ci exec -T service-backend wget -qO- http://127.0.0.1:8080/healthz >/dev/null

          docker compose --env-file "$ci_env_file" --file i12e/orchestrator/deploy/docker-compose.prod.yml ps

  publish-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs:
      - test-images-integration
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish images
        shell: bash
        run: |
          set -euo pipefail

          image_base="${REGISTRY}/${IMAGE_NAMESPACE,,}"
          sha_tag="sha-${GITHUB_SHA::12}"
          version_tag=""
          stable_tag=false

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version_tag="${GITHUB_REF_NAME}"
            if [[ "$version_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              stable_tag=true
            fi
          fi

          publish_image() {
            local name="$1"
            local image="${image_base}/${name}"

            docker pull "${image}:${sha_tag}"

            if [ -n "$version_tag" ]; then
              docker tag "${image}:${sha_tag}" "${image}:${version_tag}"
              docker push "${image}:${version_tag}"

              if [ "$stable_tag" = true ]; then
                docker tag "${image}:${sha_tag}" "${image}:stable"
                docker push "${image}:stable"
              fi
            fi
          }

          publish_image app-cockpit
          publish_image service-backend
          publish_image i12e-postgres
          publish_image i12e-gateway

  cleanup-pr-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Delete closed PR images
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const ownerType = context.payload.repository.owner.type;
            const packageNames = [
              'central/app-cockpit',
              'central/service-backend',
              'central/i12e-postgres',
              'central/i12e-gateway',
            ];
            const prTagPrefix = `pr-${context.payload.pull_request.number}-`;

            for (const packageName of packageNames) {
              const listRoute =
                ownerType === 'Organization'
                  ? 'GET /orgs/{org}/packages/{package_type}/{package_name}/versions'
                  : 'GET /user/packages/{package_type}/{package_name}/versions';
              const deleteRoute =
                ownerType === 'Organization'
                  ? 'DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}'
                  : 'DELETE /user/packages/{package_type}/{package_name}/versions/{package_version_id}';
              const packageOwner = ownerType === 'Organization' ? { org: owner } : {};

              for await (const versions of github.paginate.iterator(listRoute, {
                ...packageOwner,
                package_type: 'container',
                package_name: packageName,
                per_page: 100,
              })) {
                for (const version of versions.data) {
                  const tags = version.metadata?.container?.tags ?? [];
                  const hasClosedPrTag = tags.some((tag) => tag.startsWith(prTagPrefix));

                  if (!hasClosedPrTag) {
                    continue;
                  }

                  await github.request(deleteRoute, {
                    ...packageOwner,
                    package_type: 'container',
                    package_name: packageName,
                    package_version_id: version.id,
                  });
                }
              }
            }

  package-deploy-bundle:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - publish-images
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Package deploy bundle
        run: |
          mkdir -p dist
          tar -czf "dist/central-deploy-${GITHUB_REF_NAME}.tar.gz" \
            -C i12e/orchestrator/deploy \
            docker-compose.prod.yml \
            central-update \
            .env.prod.example

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v7
        with:
          name: central-deploy-${{ github.ref_name }}
          path: dist/central-deploy-${{ github.ref_name }}.tar.gz
          retention-days: 1
