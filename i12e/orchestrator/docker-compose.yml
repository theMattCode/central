name: ${COMPOSE_PROJECT_NAME:-central-i12e}

services:
  i12e-postgres:
    build:
      context: ../postgres
      dockerfile: Dockerfile
    image: central/i12e/postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-central}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the orchestrator environment file.}
      POSTGRES_DB: ${POSTGRES_DB:-central}
    restart: ${SERVICE_RESTART_POLICY:-unless-stopped}
    ports:
      - '${POSTGRES_PORT:-3001}:5432'
    volumes:
      - central_i12e-postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  i12e-postgres-migrate:
    image: central/i12e/postgres:18.3
    depends_on:
      i12e-postgres:
        condition: service_healthy
    environment:
      PGHOST: i12e-postgres
      PGPORT: '5432'
      PGDATABASE: ${POSTGRES_DB:-central}
      PGUSER: ${POSTGRES_USER:-central}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the orchestrator environment file.}
    command: ['apply-migrations.sh']
    restart: 'no'

  service-backend:
    build:
      context: ../..
      dockerfile: services/backend/Dockerfile
    image: central/services/backend:latest
    depends_on:
      i12e-postgres:
        condition: service_healthy
    environment:
      BACKEND_PORT: '8080'
      BACKEND_DATABASE_URL: ${BACKEND_DATABASE_URL:-postgres://central:central@i12e-postgres:5432/central}
      BACKEND_CORS_ALLOW_ORIGIN: ${BACKEND_CORS_ALLOW_ORIGIN:-*}
      WEATHER_REFRESH_INTERVAL_SECONDS: ${WEATHER_REFRESH_INTERVAL_SECONDS:-900}
      WEATHER_REQUEST_TIMEOUT_SECONDS: ${WEATHER_REQUEST_TIMEOUT_SECONDS:-10}
      WEATHER_OPEN_METEO_BASE_URL: ${WEATHER_OPEN_METEO_BASE_URL:-https://api.open-meteo.com}
    restart: ${SERVICE_RESTART_POLICY:-unless-stopped}
    ports:
      - '${BACKEND_PORT:-3010}:8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO', '-', 'http://127.0.0.1:8080/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

