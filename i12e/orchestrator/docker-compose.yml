name: ${COMPOSE_PROJECT_NAME:-central-i12e}

services:

  i12e-postgres:
    build:
      context: ../postgres
      dockerfile: Dockerfile
    image: central/i12e/postgres:16.4
    environment:
      POSTGRES_USER: central
      POSTGRES_PASSWORD: central
      POSTGRES_DB: central
    ports:
      - '${POSTGRES_PORT:-3001}:5432'
    volumes:
      - central_i12e-postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  i12e-postgres-migrate:
    image: central/i12e/postgres:16.4
    depends_on:
      i12e-postgres:
        condition: service_healthy
    environment:
      PGHOST: i12e-postgres
      PGPORT: '5432'
      PGDATABASE: central
      PGUSER: central
      PGPASSWORD: central
    command: ['apply-migrations.sh']
    restart: 'no'

  service-weather:
    build:
      context: ../..
      dockerfile: services/weather/Dockerfile
    image: central/services/weather:latest
    depends_on:
      i12e-postgres:
        condition: service_healthy
    environment:
      WEATHER_PORT: '8080'
      WEATHER_REFRESH_INTERVAL_SECONDS: ${WEATHER_REFRESH_INTERVAL_SECONDS:-900}
      WEATHER_REQUEST_TIMEOUT_SECONDS: ${WEATHER_REQUEST_TIMEOUT_SECONDS:-10}
      WEATHER_DATABASE_URL: ${WEATHER_DATABASE_URL:-postgres://central:central@i12e-postgres:5432/central}
      WEATHER_CORS_ALLOW_ORIGIN: ${WEATHER_CORS_ALLOW_ORIGIN:-*}
    ports:
      - '${WEATHER_PORT:-3010}:8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO', '-', 'http://127.0.0.1:8080/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app-cockpit:
    build:
      context: ../..
      dockerfile: apps/cockpit/Dockerfile
      args:
        VITE_WEATHER_API_BASE_URL: ${WEATHER_API_BASE_URL:-http://localhost:3010}
    image: central/apps/cockpit:latest
    depends_on:
      i12e-postgres:
        condition: service_healthy
      service-weather:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://central:central@postgres:5432/central
      NODE_ENV: ${COCKPIT_NODE_ENV:-production}
    ports:
      - '${COCKPIT_PORT:-3000}:3000'

volumes:
  central_i12e-postgres_data:
