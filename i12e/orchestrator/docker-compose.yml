name: ${COMPOSE_PROJECT_NAME:-central-i12e}

services:
  i12e-postgres:
    build:
      context: ../postgres
      dockerfile: Dockerfile
    image: central/i12e/postgres:16.4
    environment:
      POSTGRES_USER: central
      POSTGRES_PASSWORD: central
      POSTGRES_DB: central
    ports:
      - '${POSTGRES_PORT:-3001}:5432'
    volumes:
      - central_i12e-postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  i12e-postgres-migrate:
    image: central/i12e/postgres:16.4
    depends_on:
      i12e-postgres:
        condition: service_healthy
    environment:
      PGHOST: i12e-postgres
      PGPORT: '5432'
      PGDATABASE: central
      PGUSER: central
      PGPASSWORD: central
    command: ['apply-migrations.sh']
    restart: 'no'

  service-weather:
    build:
      context: ../..
      dockerfile: services/weather/Dockerfile
    image: central/services/weather:latest
    depends_on:
      i12e-postgres:
        condition: service_healthy
    environment:
      WEATHER_PORT: '8080'
      WEATHER_REFRESH_INTERVAL_SECONDS: ${WEATHER_REFRESH_INTERVAL_SECONDS:-900}
      WEATHER_REQUEST_TIMEOUT_SECONDS: ${WEATHER_REQUEST_TIMEOUT_SECONDS:-10}
      WEATHER_DATABASE_URL: ${WEATHER_DATABASE_URL:-postgres://central:central@i12e-postgres:5432/central}
      WEATHER_CORS_ALLOW_ORIGIN: ${WEATHER_CORS_ALLOW_ORIGIN:-*}
    ports:
      - '${WEATHER_PORT:-3010}:8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO', '-', 'http://127.0.0.1:8080/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  service-voice:
    build:
      context: ../..
      dockerfile: services/voice/Dockerfile
    image: central/services/voice:latest
    environment:
      VOICE_PORT: '8080'
      VOICE_REQUEST_TIMEOUT_SECONDS: ${VOICE_REQUEST_TIMEOUT_SECONDS:-30}
      VOICE_CORS_ALLOW_ORIGIN: ${VOICE_CORS_ALLOW_ORIGIN:-*}
      VOICE_BACKEND_MODE: ${VOICE_BACKEND_MODE:-mock}
      VOICE_DEFAULT_LANGUAGE: ${VOICE_DEFAULT_LANGUAGE:-de}
      VOICE_DEFAULT_VOICE_INSTRUCTION: ${VOICE_DEFAULT_VOICE_INSTRUCTION:-}
      VOICE_ASSISTANT_NAME: ${VOICE_ASSISTANT_NAME:-}
      VOICE_LLM_SYSTEM_PROMPT: ${VOICE_LLM_SYSTEM_PROMPT:-}
      VOICE_STT_URL: ${VOICE_STT_URL:-}
      VOICE_STT_MODEL: ${VOICE_STT_MODEL:-}
      VOICE_TTS_URL: ${VOICE_TTS_URL:-}
      VOICE_TTS_MODEL: ${VOICE_TTS_MODEL:-}
      VOICE_TTS_VOICE: ${VOICE_TTS_VOICE:-}
      VOICE_LLM_BASE_URL: ${VOICE_LLM_BASE_URL:-}
      VOICE_LLM_API_KEY: ${VOICE_LLM_API_KEY:-}
      VOICE_LLM_MODEL: ${VOICE_LLM_MODEL:-}
    ports:
      - '${VOICE_PORT:-3020}:8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO', '-', 'http://127.0.0.1:8080/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  service-voice-local-stt:
    build:
      context: ../..
      dockerfile: services/voice-local-stt/Dockerfile
    image: central/services/voice-local-stt:latest
    environment:
      VOICE_LOCAL_STT_PORT: '8081'
      VOICE_LOCAL_STT_MODEL: ${VOICE_LOCAL_STT_MODEL:-small}
      VOICE_LOCAL_STT_DEVICE: ${VOICE_LOCAL_STT_DEVICE:-cpu}
      VOICE_LOCAL_STT_COMPUTE_TYPE: ${VOICE_LOCAL_STT_COMPUTE_TYPE:-int8}
      VOICE_LOCAL_STT_BEAM_SIZE: ${VOICE_LOCAL_STT_BEAM_SIZE:-5}
      VOICE_LOCAL_STT_VAD_FILTER: ${VOICE_LOCAL_STT_VAD_FILTER:-true}
      HF_HOME: ${VOICE_LOCAL_STT_CACHE_DIR:-/models}
    ports:
      - '${VOICE_LOCAL_STT_PORT:-3030}:8081'
    volumes:
      - central_voice_local_stt_models:${VOICE_LOCAL_STT_CACHE_DIR:-/models}
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8081/healthz").read()',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  service-voice-local-tts:
    build:
      context: ../..
      dockerfile: services/voice-local-tts/Dockerfile
    image: central/services/voice-local-tts:latest
    environment:
      VOICE_LOCAL_TTS_PORT: '8082'
      VOICE_LOCAL_TTS_EXECUTABLE: ${VOICE_LOCAL_TTS_EXECUTABLE:-piper}
      VOICE_LOCAL_TTS_MODEL: ${VOICE_LOCAL_TTS_MODEL:-de_DE-thorsten-medium}
      VOICE_LOCAL_TTS_SPEAKER: ${VOICE_LOCAL_TTS_SPEAKER:-}
      VOICE_LOCAL_TTS_DATA_DIR: ${VOICE_LOCAL_TTS_DATA_DIR:-/models}
      VOICE_LOCAL_TTS_DOWNLOAD_DIR: ${VOICE_LOCAL_TTS_DOWNLOAD_DIR:-/models}
      VOICE_LOCAL_TTS_USE_CUDA: ${VOICE_LOCAL_TTS_USE_CUDA:-false}
    ports:
      - '${VOICE_LOCAL_TTS_PORT:-3040}:8082'
    volumes:
      - central_voice_local_tts_models:/models
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8082/healthz").read()',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  service-voice-local-llm-runtime:
    image: ${VOICE_LOCAL_LLM_RUNTIME_IMAGE:-ollama/ollama:latest}
    command: ['serve']
    environment:
      OLLAMA_KEEP_ALIVE: ${VOICE_LOCAL_LLM_KEEP_ALIVE:-5m}
    ports:
      - '${VOICE_LOCAL_LLM_RUNTIME_PORT:-3051}:11434'
    volumes:
      - central_voice_local_llm_models:/root/.ollama
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  service-voice-local-llm-pull:
    image: ${VOICE_LOCAL_LLM_RUNTIME_IMAGE:-ollama/ollama:latest}
    depends_on:
      service-voice-local-llm-runtime:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://service-voice-local-llm-runtime:11434
      VOICE_LOCAL_LLM_MODEL: ${VOICE_LOCAL_LLM_MODEL:-qwen2.5:3b}
    command: ['pull', '${VOICE_LOCAL_LLM_MODEL:-qwen2.5:3b}']
    restart: 'no'

  service-voice-local-llm:
    build:
      context: ../..
      dockerfile: services/voice-local-llm/Dockerfile
    image: central/services/voice-local-llm:latest
    depends_on:
      service-voice-local-llm-runtime:
        condition: service_healthy
    environment:
      VOICE_LOCAL_LLM_PORT: '8083'
      VOICE_LOCAL_LLM_OLLAMA_URL: http://service-voice-local-llm-runtime:11434
      VOICE_LOCAL_LLM_REQUEST_TIMEOUT_SECONDS: ${VOICE_LOCAL_LLM_REQUEST_TIMEOUT_SECONDS:-120}
      VOICE_LOCAL_LLM_DEFAULT_MODEL: ${VOICE_LOCAL_LLM_MODEL:-qwen2.5:3b}
    ports:
      - '${VOICE_LOCAL_LLM_PORT:-3050}:8083'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8083/healthz").read()',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app-cockpit:
    build:
      context: ../..
      dockerfile: apps/cockpit/Dockerfile
      args:
        WEATHER_SERVICE_BASE_URL: ${WEATHER_SERVICE_BASE_URL:-http://service-weather:8080}
        VOICE_SERVICE_BASE_URL: ${VOICE_SERVICE_BASE_URL:-http://service-voice:8080}
    image: central/apps/cockpit:latest
    depends_on:
      i12e-postgres:
        condition: service_healthy
      service-weather:
        condition: service_healthy
      service-voice:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://central:central@postgres:5432/central
      NODE_ENV: ${COCKPIT_NODE_ENV:-production}
      WEATHER_SERVICE_BASE_URL: ${WEATHER_SERVICE_BASE_URL:-http://service-weather:8080}
      VOICE_SERVICE_BASE_URL: ${VOICE_SERVICE_BASE_URL:-http://service-voice:8080}
    ports:
      - '${COCKPIT_PORT:-3000}:3000'

volumes:
  central_i12e-postgres_data:
  central_voice_local_stt_models:
  central_voice_local_tts_models:
  central_voice_local_llm_models:
